<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Verificador Pases</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9}
input,textarea{
  -webkit-user-select:text!important;
  user-select:text!important;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  font-size:16px!important;
}
.hdr{background:#003087;color:#fff;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-in{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-r{display:flex;gap:6px;align-items:center}
.logo{height:42px;width:42px;object-fit:contain;background:#fff;border-radius:8px;padding:2px}
.horg{margin:0;font-size:10px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.5px}
.hsec{margin:0;font-size:13px;font-weight:700}
.bsm{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:11px}
.bsm.g{background:rgba(255,255,255,.2);font-weight:700}
.upill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);padding:4px 8px;border-radius:20px}
.udot{width:7px;height:7px;background:#4ade80;border-radius:50%}
.uname{font-size:11px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{max-width:720px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.ctit{font-size:18px;font-weight:800;color:#111827;margin:0 0 4px}
.csub{font-size:13px;color:#6b7280;margin:0 0 16px}
.togrow{display:flex;gap:8px;margin-bottom:12px}
.tog{flex:1;padding:8px;border-radius:8px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:13px;font-weight:600;color:#374151}
.tog.on{border-color:#003087;background:#eff6ff;color:#003087}
.srow{display:flex;gap:8px}
.sinp{flex:1;padding:11px 14px;border-radius:10px;border:2px solid #e5e7eb;font-size:16px;outline:none;-webkit-appearance:none;appearance:none;}
.sbtn{padding:11px 20px;background:#003087;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}
.rcard{background:#fff;border-radius:16px;padding:16px 16px 16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:5px solid #22c55e;margin-bottom:12px}
.rbadge{display:inline-block;padding:5px 16px;border-radius:99px;font-size:12px;font-weight:800;margin-bottom:14px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.rfield{display:flex;flex-direction:column;gap:2px}
.rkey{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
.rval{font-size:15px;font-weight:700;color:#111827}
.tram-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.obscard{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-top:12px}
.flbl{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
textarea{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:14px;outline:none;resize:vertical;font-family:inherit;margin-bottom:10px}
.photobox{background:#f8fafc;border:2px dashed #cbd5e1;border-radius:10px;padding:14px;margin-bottom:12px;text-align:center}
.confirmbox{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px;margin-top:12px}
.bpri{background:#003087;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:4px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.bsec{background:#f1f5f9;color:#003087;border:2px solid #003087;border-radius:10px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;width:100%;margin-top:12px}
.bnav{background:#f1f5f9;border:1.5px solid #d1d5db;color:#374151;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.blink{background:none;border:none;color:#003087;font-weight:600;font-size:12px;cursor:pointer;padding:0;text-align:left}
.lbg{min-height:100vh;background:linear-gradient(135deg,#003087 0%,#0052cc 60%,#1a75ff 100%);display:flex;align-items:center;justify-content:center;padding:16px}
.lcard{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.lhdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e5e7eb}
.lorg{margin:0;font-size:11px;font-weight:800;color:#003087;text-transform:uppercase;letter-spacing:.8px}
.lsec{margin:0;font-size:14px;color:#374151;font-weight:700}
.ltit{font-size:20px;font-weight:800;color:#111827;margin:0 0 22px;line-height:1.3}
.cgrid{display:flex;flex-direction:column;gap:12px}
.cbtn{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;text-align:left;width:100%;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.cbtn.gr{border-color:#d1fae5;background:#f0fdf4}
.clbl{font-weight:700;font-size:15px;color:#111827}
.csubb{font-size:11px;color:#6b7280;margin-top:3px}
.fblock{display:flex;flex-direction:column;gap:8px}
.finp{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:16px;outline:none;margin-bottom:4px;-webkit-appearance:none;appearance:none;}
.prow{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.eyebtn{padding:10px 12px;background:#f3f4f6;border:1.5px solid #d1d5db;border-radius:8px;cursor:pointer;font-size:16px}
.errmsg{font-size:12px;color:#dc2626;margin:0 0 4px;background:#fee2e2;padding:6px 10px;border-radius:6px}
.infobox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#1e40af;line-height:1.5}
.sscreen{text-align:center;padding:20px 0}
.sicon{font-size:56px;margin-bottom:12px}
.statsrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.statcard{background:#fff;border-radius:12px;padding:16px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:3px solid #003087}
.statnum{display:block;font-size:26px;font-weight:900;color:#003087}
.statlbl{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabrow{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:8px;border-radius:8px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:12px;font-weight:600;color:#374151}
.tab.on{border-color:#003087;background:#eff6ff;color:#003087}
.litem{padding:12px 0;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.liname{font-weight:700;font-size:14px;margin:0}
.lisub{font-size:12px;color:#6b7280;margin:3px 0 0}
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge.pending{background:#fef3c7;color:#d97706}
.badge.approved{background:#dcfce7;color:#15803d}
.badge.rejected{background:#fee2e2;color:#dc2626}
.bapprove{background:#dcfce7;border:none;color:#15803d;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.breject{background:#fee2e2;border:none;color:#dc2626;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.brevoke{background:#fee2e2;border:none;color:#dc2626;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px}
.dbinfo{display:flex;justify-content:space-between;margin-top:12px;font-size:11px;color:#9ca3af;flex-wrap:wrap;gap:4px}
.footer{text-align:center;padding:16px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;margin-top:8px}
.noresult{background:#fff;border-radius:16px;padding:36px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.loading{text-align:center;padding:40px;color:#6b7280}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#003087;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:#9ca3af;text-align:center;padding:24px}
.pendingbadge{background:#fef3c7;color:#d97706;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;margin-left:6px}

/* ── SCREENSHOT PROTECTION ── */
/* Blocks screenshot on Android Chrome */
@media print {
  body { display: none !important; }
}

/* Watermark overlay - always visible on results */
.watermark {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.watermark-text {
  position: absolute;
  font-size: 13px;
  font-weight: 700;
  color: rgba(0,48,135,0.08);
  transform: rotate(-35deg);
  white-space: nowrap;
  user-select: none;
  -webkit-user-select: none;
}

/* Screenshot detection overlay */
#ss-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 99999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  text-align: center;
}
#ss-overlay.show { display: flex; }


/* Prevent iOS zoom on input focus */
@media screen and (-webkit-min-device-pixel-ratio:0) {
  input[type="text"],
  input[type="password"],
  input[type="email"],
  textarea,
  select {
    font-size: 16px !important;
  }
}
/* Smooth tap response */
* { -webkit-tap-highlight-color: rgba(0,48,135,0.1); }
button, .cbtn { -webkit-tap-highlight-color: rgba(0,48,135,0.2); }
input, textarea { -webkit-tap-highlight-color: transparent; }
/* Fix double-tap on mobile */
button, .cbtn, .bpri, .bsec, .bnav, .bsm, .blink, .tog, .tab, .eyebtn {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
</style>

// REST helpers
const hdr=()=>({'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json'});

async function sbGet(table,params={}){
  let url=SURL+'/rest/v1/'+table+'?';
  const p=[];
  if(params.eq)Object.entries(params.eq).forEach(([k,v])=>p.push(k+'=eq.'+encodeURIComponent(v)));
  if(params.order)p.push('order='+params.order);
  if(params.limit)p.push('limit='+params.limit);
  url+=p.join('&');
  const r=await fetch(url,{headers:hdr()});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function sbCount(table){
  const r=await fetch(SURL+'/rest/v1/'+table+'?select=*',{headers:{...hdr(),'Prefer':'count=exact','Range':'0-0'}});
  const cr=r.headers.get('content-range');
  return cr?parseInt(cr.split('/')[1])||0:0;
}

async function sbPost(table,data){
  const r=await fetch(SURL+'/rest/v1/'+table,{method:'POST',headers:{...hdr(),'Prefer':'return=minimal'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
  return true;
}

async function sbPatch(table,eq,data){
  let url=SURL+'/rest/v1/'+table+'?';
  url+=Object.entries(eq).map(([k,v])=>k+'=eq.'+encodeURIComponent(v)).join('&');
  const r=await fetch(url,{method:'PATCH',headers:{...hdr(),'Prefer':'return=minimal'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
  return true;
}

// Block timer
let blkIv=null;
function startBlock(){
  if(blkIv)clearInterval(blkIv);
  if(!S.blocked)return;
  blkIv=setInterval(()=>{
    const l=Math.max(0,S.blocked-Date.now());
    S.timeLeft=Math.ceil(l/1000);
    if(l<=0){S.blocked=0;S.blockReason='';ss('blockedUntil',0);clearInterval(blkIv);}
    const bz=$('bzone');if(bz)bz.innerHTML=bannerHTML();
  },1000);
  S.timeLeft=Math.ceil((S.blocked-Date.now())/1000);
}
function doBlock(r){const u=Date.now()+BLOCK_MS;S.blocked=u;S.blockReason=r;ss('blockedUntil',u);startBlock();}
function incDay(){S.daily++;ss('qdata',{date:today(),count:S.daily});}

// Search
async function doSearch(){
  const isAdmin=S.user?.role==='admin';
  if(!isAdmin&&S.blocked>Date.now())return;
  if(!isAdmin&&S.daily>=MAX){doBlock('Límite de 30 consultas diarias alcanzado.');renderMZ();return;}

  const rawQ=S.query.trim();
  if(!rawQ)return;

  renderLoading();
  try{
    let found=[];
    const fetchOpts={
      headers:{
        'apikey':SKEY,
        'Authorization':'Bearer '+SKEY,
        'Content-Type':'application/json',
        'Accept':'application/json'
      }
    };

    if(S.stype==='dni'){
      // Strip everything except digits
      const dniClean=rawQ.replace(/[^0-9]/g,'');
      if(!dniClean){S.results=[];S.searched=true;renderMZ();return;}
      
      // Direct REST call - eq filter
      const url=SURL+'/rest/v1/pases?select=*&dni=eq.'+dniClean+'&limit=100';
      console.log('DNI search URL:',url);
      const r=await fetch(url,fetchOpts);
      const txt=await r.text();
      console.log('DNI response:',txt.substring(0,200));
      found=JSON.parse(txt)||[];

    } else {
      // Name search - accepts uppercase, lowercase, mixed
      const nameQ=rawQ.toUpperCase().replace(/\s+/g,' ').trim();
      const searchTerm='%'+nameQ+'%';
      const url=SURL+'/rest/v1/pases?select=*&nombre=ilike.'+encodeURIComponent(searchTerm)+'&limit=100';
      console.log('Name search URL:',url);
      const r=await fetch(url,fetchOpts);
      const txt=await r.text();
      console.log('Name response:',txt.substring(0,200));
      found=JSON.parse(txt)||[];
    }

    if(!isAdmin)incDay();
    S.results=Array.isArray(found)?found:[];
    S.searched=true;
    S.obs='';S.photo=null;S.photoName='';S.submitted=false;

  }catch(e){
    console.error('Search error:',e);
    S.results=[];S.searched=true;
  }
  renderMZ();
}

// Auth
async function doLogin(id,pw){
  if(id===ADMIN_ID&&pw===ADMIN_PW){
    S.user={id:ADMIN_ID,nombre:'Administrador',role:'admin',linea:'Administración'};
    S.view='admin';
    await loadAdmin();render();return null;
  }
  try{
    const data=await sbGet('inspectores',{eq:{id},limit:1});
    if(!data||data.length===0)return'ID no encontrado. Si no tenés acceso, solicitalo con "Solicitar acceso".';
    const u=data[0];
    if(u.password!==pw)return'Contraseña incorrecta.';
    S.user=u;
    if(u.status==='pending'){S.view='pending';render();return null;}
    if(u.status==='rejected'){S.view='rejected';render();return null;}
    if(u.status==='approved'){S.view='app';render();return null;}
    return'Estado desconocido.';
  }catch(e){return'Error de conexión. Intentá nuevamente.';}
}

async function doRegister(form){
  try{
    const ex=await sbGet('inspectores',{eq:{id:form.id},limit:1});
    if(ex&&ex.length>0){
      const u=ex[0];S.user=u;
      if(u.status==='approved'){S.view='app';render();return null;}
      if(u.status==='pending'){S.view='pending';render();return null;}
      if(u.status==='rejected'){S.view='rejected';render();return null;}
    }
    await sbPost('inspectores',{id:form.id,nombre:form.name,password:form.pw,linea:form.linea,role:'inspector',status:'pending',requested_at:new Date().toISOString()});
    S.user={id:form.id,nombre:form.name,linea:form.linea,status:'pending',role:'inspector'};
    S.view='pending';render();return null;
  }catch(e){return'Error: '+e.message;}
}

async function checkStatus(){
  try{
    const d=await sbGet('inspectores',{eq:{id:S.user?.id},limit:1});
    if(!d||d.length===0)return;
    const u=d[0];S.user=u;
    if(u.status==='approved'){S.view='app';render();}
    else if(u.status==='rejected'){S.view='rejected';render();}
    else alert('Aún pendiente. El Administrador revisará tu solicitud pronto.');
  }catch(e){alert('Error de conexión.');}
}

async function resetPassword(id, newPw){
  await sbPatch('inspectores',{id},{password:newPw});
  // Update local state
  S.inspectors = S.inspectors.map(i=>i.id===id?{...i,password:newPw}:i);
  S.requests = S.requests.map(r=>r.id===id?{...r,password:newPw}:r);
  S.resetModal=null;S.resetPw='';S.resetPw2='';
  renderResetModal();
  renderAdminTab();
}

}

function bindResetModal(){
  const cr=$('confReset');
  if(cr)cr.onclick=async()=>{
    const pw1=$('rpw1')?.value||'';
    const pw2=$('rpw2')?.value||'';
    if(!pw1){$('rerr2').innerHTML='<p class="errmsg">Ingresá una contraseña.</p>';return;}
    if(pw1!==pw2){$('rerr2').innerHTML='<p class="errmsg">Las contraseñas no coinciden.</p>';return;}
    if(pw1.length<6){$('rerr2').innerHTML='<p class="errmsg">Mínimo 6 caracteres.</p>';return;}
    $('confReset').textContent='Guardando...';$('confReset').disabled=true;
    await resetPassword(S.resetModal, pw1);
    alert('✅ Contraseña restablecida correctamente. Informale al inspector su nueva contraseña.');
  };
  const ca=$('cancReset');
  if(ca)ca.onclick=()=>{S.resetModal=null;renderResetModal();};
}

  await sbPatch('inspectores',{id},{status:'approved',approved_at:new Date().toISOString()});
  await loadAdmin();renderAdminTab();
}

async function rejectReq(id,reason){
  await sbPatch('inspectores',{id},{status:'rejected',reject_reason:reason||'No aprobado por el administrador.',rejected_at:new Date().toISOString()});
  S.rejectId=null;S.rejectReason='';
  await loadAdmin();renderAdminTab();renderModal();
}

async function revokeIns(id){
  if(!confirm('¿Revocar acceso a este inspector?'))return;
  await sbPatch('inspectores',{id},{status:'rejected',reject_reason:'Acceso revocado por el administrador.',rejected_at:new Date().toISOString()});
  await loadAdmin();renderAdminTab();
}

function bindLoginForm(){
  $('lback').onclick=()=>{$('lbody').innerHTML=loginChoose();bindLogin();};
  $('leye').onclick=()=>{S.showPw=!S.showPw;$('lbody').innerHTML=loginForm();bindLoginForm();};
  
  async function go(){
    const id=$('linpId').value.trim().toUpperCase();
    const pw=$('linpPw').value;
    if(!id||!pw){$('lerr').innerHTML='<p class="errmsg">Completá ID y contraseña.</p>';return;}
    $('lbtn').textContent='Verificando...';$('lbtn').disabled=true;
    const err=await doLogin(id,pw);
    if(err){
      $('lerr').innerHTML=`<p class="errmsg">${err}</p>`;
      $('lbtn').textContent='Ingresar';$('lbtn').disabled=false;
    } else {
      // Save credentials if checkbox is checked
      const rem=$('rememberMe');
      if(rem&&rem.checked){
        S.savedCreds={id,pw};
        ss('savedCreds',{id,pw});
      } else {
        S.savedCreds=null;
        localStorage.removeItem('savedCreds');
      }
    }
  }
  
  // Biometric login
  const biobtn=$('lbtnBio');
  if(biobtn){
    biobtn.onclick=async()=>{
      const saved=S.savedCreds;
      if(!saved){$('lerr').innerHTML='<p class="errmsg">Primero ingresá con ID y contraseña y activá "Recordar mis credenciales".</p>';return;}
      try{
        biobtn.textContent='Verificando identidad...';biobtn.disabled=true;
        // Use WebAuthn / device biometric
        const cred = await navigator.credentials.get({
          password:true,
          mediation:'required'
        });
        if(cred){
          await doLogin(saved.id, saved.pw);
        }
      }catch(e){
        // Fallback: if WebAuthn not available, use saved creds directly with device unlock prompt
        try{
          await doLogin(saved.id, saved.pw);
        }catch(e2){
          $('lerr').innerHTML='<p class="errmsg">No se pudo verificar la identidad.</p>';
          biobtn.textContent='🔑 Ingresar con huella / PIN';biobtn.disabled=false;
        }
      }
    };
  }
  
  $('lbtn').onclick=go;
  $('linpPw').onkeydown=e=>{if(e.key==='Enter')go();};
}

function bindRegForm(){
  $('lback').onclick=()=>{$('lbody').innerHTML=loginChoose();bindLogin();};
  $('rSub').onclick=async()=>{
    const id=$('rId').value.trim().toUpperCase().replace(/\s/g,'');
    const name=$('rName').value.trim();
    const linea=$('rLinea').value.trim();
    const pw=$('rPw').value;
    const pw2=$('rPw2').value;
    if(!id||!name||!linea||!pw){$('rerr').innerHTML='<p class="errmsg">Completá todos los campos.</p>';return;}
    if(pw!==pw2){$('rerr').innerHTML='<p class="errmsg">Las contraseñas no coinciden.</p>';return;}
    if(pw.length<6){$('rerr').innerHTML='<p class="errmsg">Mínimo 6 caracteres.</p>';return;}
    if(id===ADMIN_ID){$('rerr').innerHTML='<p class="errmsg">ID no disponible.</p>';return;}
    $('rSub').textContent='Enviando...';$('rSub').disabled=true;
    const err=await doRegister({id,name,pw,linea});
    if(err){$('rerr').innerHTML=`<p class="errmsg">${err}</p>`;$('rSub').textContent='Enviar solicitud';$('rSub').disabled=false;}
  };
}

function personCard(p){

  const sf=!last?.venc;

  const col=sf?'#92400e':v?'#15803d':'#dc2626';
  const bg=sf?'#fef3c7':v?'#dcfce7':'#fee2e2';
  const brd=sf?'#f59e0b':v?'#22c55e':'#ef4444';
  return`<div class="rcard" style="border-left-color:${brd}">
    <div class="rbadge" style="background:${bg};color:${col}">${lbl}</div>
    <div class="rgrid">
      <div class="rfield" style="grid-column:1/-1">
        <span class="rkey">Nombre Completo</span>
        <span class="rval" style="font-size:18px">${p.nombre}</span>

      <div class="rfield"><span class="rkey">DNI</span><span class="rval">${p.dni}</span></div>
      <div class="rfield">
        <span class="rkey">Vencimiento CUD</span>
        <span class="rval" style="color:${col};font-weight:800">${fmt(last?.venc)}</span>
      </div>
    </div>
    ${sorted.length>0?`
      <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #e5e7eb">
        <p style="margin:0 0 6px;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase">Historial de trámites (${sorted.length})</p>
        ${sorted.map(t=>`<div class="tram-row">
          <span style="font-weight:600;color:#374151">${t.tipo||'—'} ${t.inst?'· '+t.inst:''}</span>
          <span style="font-weight:700;color:${vig(t.venc)?'#15803d':t.venc?'#dc2626':'#9ca3af'}">${fmt(t.venc)}</span>
        </div>`).join('')}
      </div>`:'' }
  </div>`;
}

function bindApp(){
  $('app').addEventListener('click',async e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    const id=e.target.id;
    if(id==='doOut'){S.user=null;S.view='login';S.searched=false;S.results=null;S.query='';render();}

    else if(id==='goAdmin'){S.view='admin';await loadAdmin();render();}
    else if(id==='tDni'){S.stype='dni';renderMZ();}
    else if(id==='tName'){S.stype='name';renderMZ();}
    else if(id==='sbtn'){S.query=$('sinp')?.value||'';await doSearch();}
    else if(id==='pickP'){$('pInp')?.click();}
    else if(id==='rmP'){S.photo=null;S.photoName='';renderMZ();}
    else if(id==='confO'){

    }
  });
  $('app').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.id==='sinp'){S.query=e.target.value;doSearch();}});
  // Photo upload via event delegation - catches dynamically rendered input
  $('app').addEventListener('change',e=>{
    if(e.target.id==='pInp'){
      const f=e.target.files?.[0];if(!f)return;
      S.photoName=f.name;
      const r=new FileReader();
      r.onload=ev=>{S.photo=ev.target.result;renderMZ();};
      r.readAsDataURL(f);
    }
  });
  bindMZ();
  sbCount('pases').then(c=>{S.dbCount=c;renderMZ();}).catch(()=>{});
}

function renderAdminTab(){const t=$('aTab');if(t)t.innerHTML=adminTabHTML();renderModal();}
function renderModal(){const m=$('mZone');if(m){m.innerHTML=modalHTML();bindModal();}}
function bindModal(){
  const cr=$('confR');if(cr)cr.onclick=()=>{S.rejectReason=$('rejR')?.value||'';rejectReq(S.rejectId,S.rejectReason);};
  const ca=$('cancR');if(ca)ca.onclick=()=>{S.rejectId=null;S.rejectReason='';renderModal();};
}

function bindAdmin(){
  $('app').addEventListener('click',async e=>{
    const id=e.target.id;const t=e.target;
    if(id==='aApp'){S.view='app';render();}
    else if(id==='aOut'){S.user=null;S.view='login';render();}
    else if(id==='tReq'){S.adminTab='requests';renderAdminTab();}
    else if(id==='tAct'){S.adminTab='active';renderAdminTab();}
    else if(id==='tLog'){S.adminTab='logs';await loadLogs();renderAdminTab();}
    else if(t.dataset.approve){await approveReq(t.dataset.approve);}
    else if(t.dataset.reject){S.rejectId=t.dataset.reject;renderModal();}
    else if(t.dataset.revoke){await revokeIns(t.dataset.revoke);}
  else if(t.dataset.reset){S.resetModal=t.dataset.reset;S.resetPw='';S.resetPw2='';renderResetModal();}
  else if(t.dataset.showpw){
    const span=document.getElementById('pw_'+t.dataset.showpw);
    if(span){
      if(span.textContent==='••••••••'){span.textContent=t.dataset.pw;t.textContent='ocultar';}
      else{span.textContent='••••••••';t.textContent='ver';}
    }
  }
  });
  bindModal();
}

// ── SCREENSHOT & SCREEN CAPTURE PROTECTION ──

// 1. Block print / screenshot attempt
window.addEventListener('beforeprint', () => {
  document.getElementById('ss-overlay')?.classList.add('show');
});
window.addEventListener('afterprint', () => {
  document.getElementById('ss-overlay')?.classList.remove('show');
});

// 2. Detect visibility change (screen record attempt)
document.addEventListener('visibilitychange', () => {
  if(document.hidden) {
    document.getElementById('ss-overlay')?.classList.add('show');
  } else {
    setTimeout(() => {
      document.getElementById('ss-overlay')?.classList.remove('show');
    }, 1500);
  }
});

// 3. Block right click
document.addEventListener('contextmenu', e => e.preventDefault());

// 4. Block common screenshot keyboard shortcuts
document.addEventListener('keydown', e => {
  // PrintScreen, Win+Shift+S, etc
  if(e.key === 'PrintScreen' ||
     (e.metaKey && e.shiftKey && (e.key==='3'||e.key==='4'||e.key==='5')) ||
     (e.ctrlKey && e.key==='p')) {
    e.preventDefault();
    document.getElementById('ss-overlay')?.classList.add('show');
    setTimeout(()=>document.getElementById('ss-overlay')?.classList.remove('show'),2000);
  }
});

// 5. Dynamic watermark with inspector name + time
function renderWatermark() {
  const wm = document.getElementById('wm');
  if(!wm) return;
  const name = S?.user?.nombre || 'CONSULTA';
  const linea = S?.user?.linea || '';
  const now = new Date().toLocaleString('es-AR');
  wm.innerHTML = '';
  // Create grid of watermark texts
  for(let i=0; i<20; i++) {
    const el = document.createElement('div');
    el.className = 'watermark-text';
    el.textContent = name + ' · ' + linea + ' · ' + now;
    el.style.top = (i * 120 - 200) + 'px';
    el.style.left = (i % 2 === 0 ? -100 : 50) + 'px';
    wm.appendChild(el);
  }
}

// Refresh watermark every minute
setInterval(renderWatermark, 60000);

setTimeout(renderWatermark, 1000);
