<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Verificador de Pases — DGT</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9}
input,textarea{-webkit-user-select:text!important;user-select:text!important}

/* HEADER */
.hdr{background:#003087;color:#fff;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-in{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-r{display:flex;gap:6px;align-items:center}
.logo{height:42px;width:42px;object-fit:contain;background:#fff;border-radius:8px;padding:2px}
.horg{margin:0;font-size:10px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.5px}
.hsec{margin:0;font-size:13px;font-weight:700}
.bsm{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:11px}
.bsm.g{background:rgba(255,255,255,.2);font-weight:700}
.upill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);padding:4px 8px;border-radius:20px}
.udot{width:7px;height:7px;background:#4ade80;border-radius:50%}
.uname{font-size:11px;font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpill{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:12px}
.cnum{font-size:16px;font-weight:800;line-height:1}
.clbl{font-size:9px;opacity:.8;text-transform:uppercase;letter-spacing:.5px}

/* MAIN */
.main{max-width:720px;margin:0 auto;padding:16px}

/* CARDS */
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.ctit{font-size:18px;font-weight:800;color:#111827;margin:0 0 4px}
.csub{font-size:13px;color:#6b7280;margin:0 0 16px}

/* TOGGLE */
.togrow{display:flex;gap:8px;margin-bottom:12px}
.tog{flex:1;padding:8px;border-radius:8px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:13px;font-weight:600;color:#374151}
.tog.on{border-color:#003087;background:#eff6ff;color:#003087}

/* SEARCH */
.srow{display:flex;gap:8px}
.sinp{flex:1;padding:11px 14px;border-radius:10px;border:2px solid #e5e7eb;font-size:14px;outline:none}
.sinp:disabled{background:#f3f4f6;color:#9ca3af;cursor:not-allowed}
.sbtn{padding:11px 20px;background:#003087;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}
.sbtn:disabled{background:#9ca3af;cursor:not-allowed}

/* USAGE */
.ubar{margin-top:12px;display:flex;align-items:center;gap:8px}
.utrack{flex:1;height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.ufill{height:100%;border-radius:99px;transition:width .3s,background-color .3s}
.utxt{font-size:11px;color:#6b7280;white-space:nowrap}

/* RESULT */
.rcard{background:#fff;border-radius:16px;padding:16px 16px 16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:5px solid #22c55e;margin-bottom:12px}
.rbadge{display:inline-block;padding:5px 16px;border-radius:99px;font-size:12px;font-weight:800;margin-bottom:14px;letter-spacing:.4px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.rfield{display:flex;flex-direction:column;gap:2px}
.rkey{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
.rval{font-size:15px;font-weight:700;color:#111827}

/* TRAMITE HISTORY */
.tram-block{margin-top:8px;padding-top:8px;border-top:1px dashed #e5e7eb}
.tram-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.tram-tipo{font-weight:700;color:#374151}
.tram-fecha{color:#6b7280}
.tram-venc{font-weight:700}

/* OBS */
.obscard{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-top:12px}
.obstit{font-size:16px;font-weight:800;color:#111827;margin:0 0 4px}
.obssub{font-size:12px;color:#6b7280;margin:0 0 14px}
.flbl{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
textarea{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:14px;outline:none;resize:vertical;font-family:inherit;margin-bottom:10px}
.photobox{background:#f8fafc;border:2px dashed #cbd5e1;border-radius:10px;padding:14px;margin-bottom:12px;text-align:center}
.photopreview{display:flex;align-items:center;gap:10px;text-align:left}

/* CONFIRM */
.confirmbox{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px;margin-top:12px}

/* BUTTONS */
.bpri{background:#003087;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:4px}
.bsec{background:#f1f5f9;color:#003087;border:2px solid #003087;border-radius:10px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;width:100%;margin-top:12px}
.bnav{background:#f1f5f9;border:1.5px solid #d1d5db;color:#374151;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.blink{background:none;border:none;color:#003087;font-weight:600;font-size:12px;cursor:pointer;padding:0;text-align:left}

/* BANNER */
.banner{padding:12px 16px;display:flex;align-items:flex-start;gap:12px;border-bottom:2px solid}
.banner.blk{background:#fee2e2;border-color:#fca5a5}
.banner.wrn{background:#fef3c7;border-color:#fde68a}
.btit{font-weight:700;font-size:14px;margin:0 0 2px;color:#111827}
.bmsg{font-size:12px;color:#374151;margin:0}

/* LOGIN */
.lbg{min-height:100vh;background:linear-gradient(135deg,#003087 0%,#0052cc 60%,#1a75ff 100%);display:flex;align-items:center;justify-content:center;padding:16px}
.lcard{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.lhdr{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e5e7eb}
.lorg{margin:0;font-size:11px;font-weight:800;color:#003087;text-transform:uppercase;letter-spacing:.8px}
.lsec{margin:0;font-size:14px;color:#374151;font-weight:700}
.ltit{font-size:20px;font-weight:800;color:#111827;margin:0 0 22px;line-height:1.3}
.cgrid{display:flex;flex-direction:column;gap:12px}
.cbtn{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;text-align:left;width:100%}
.cbtn.gr{border-color:#d1fae5;background:#f0fdf4}
.cbtn.bl{border-color:#bfdbfe;background:#eff6ff}
.clbl{font-weight:700;font-size:15px;color:#111827}
.csubb{font-size:11px;color:#6b7280;margin-top:3px}
.fblock{display:flex;flex-direction:column;gap:8px}
.finp{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:14px;outline:none;margin-bottom:4px}
.prow{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.eyebtn{padding:10px 12px;background:#f3f4f6;border:1.5px solid #d1d5db;border-radius:8px;cursor:pointer;font-size:16px}
.errmsg{font-size:12px;color:#dc2626;margin:0 0 4px;background:#fee2e2;padding:6px 10px;border-radius:6px}
.infobox{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#1e40af;line-height:1.5}

/* STATUS SCREENS */
.sscreen{text-align:center;padding:20px 0}
.sicon{font-size:56px;margin-bottom:12px}

/* ADMIN */
.statsrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.statcard{background:#fff;border-radius:12px;padding:16px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:3px solid #003087}
.statnum{display:block;font-size:26px;font-weight:900;color:#003087}
.statlbl{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabrow{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:8px;border-radius:8px;border:2px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:12px;font-weight:600;color:#374151}
.tab.on{border-color:#003087;background:#eff6ff;color:#003087}
.litem{padding:12px 0;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.liname{font-weight:700;font-size:14px;margin:0}
.lisub{font-size:12px;color:#6b7280;margin:3px 0 0}
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.badge.pending{background:#fef3c7;color:#d97706}
.badge.approved{background:#dcfce7;color:#15803d}
.badge.rejected{background:#fee2e2;color:#dc2626}
.bapprove{background:#dcfce7;border:none;color:#15803d;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.breject{background:#fee2e2;border:none;color:#dc2626;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.brevoke{background:#fee2e2;border:none;color:#dc2626;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px}

/* MISC */
.dbinfo{display:flex;justify-content:space-between;margin-top:12px;font-size:11px;color:#9ca3af;flex-wrap:wrap;gap:4px}
.footer{text-align:center;padding:16px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;margin-top:8px}
.noresult{background:#fff;border-radius:16px;padding:36px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.loading{text-align:center;padding:40px;color:#6b7280}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#003087;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:#9ca3af;text-align:center;padding:24px}
</style>
</head>

// Supabase REST helper - NO module imports, plain fetch
async function sbSelect(table, params={}) {
  let url = SUPA_URL + '/rest/v1/' + table + '?';
  const parts = [];
  if(params.eq) Object.entries(params.eq).forEach(([k,v]) => parts.push(k+'=eq.'+encodeURIComponent(v)));
  if(params.ilike) Object.entries(params.ilike).forEach(([k,v]) => parts.push(k+'=ilike.'+encodeURIComponent(v)));
  if(params.order) parts.push('order='+params.order);
  if(params.limit) parts.push('limit='+params.limit);
  if(params.select) parts.push('select='+params.select);
  url += parts.join('&');
  const res = await fetch(url, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json'
    }
  });
  if(!res.ok) { const e=await res.text(); throw new Error(e); }
  return res.json();
}

async function sbCount(table) {
  const res = await fetch(SUPA_URL+'/rest/v1/'+table+'?select=*', {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Prefer': 'count=exact',
      'Range': '0-0'
    }
  });
  const cr = res.headers.get('content-range');
  return cr ? parseInt(cr.split('/')[1])||0 : 0;
}

async function sbInsert(table, data) {
  const res = await fetch(SUPA_URL+'/rest/v1/'+table, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if(!res.ok) { const e=await res.text(); throw new Error(e); }
  return true;
}

async function sbUpdate(table, eq, data) {
  let url = SUPA_URL+'/rest/v1/'+table+'?';
  url += Object.entries(eq).map(([k,v])=>k+'=eq.'+encodeURIComponent(v)).join('&');
  const res = await fetch(url, {
    method: 'PATCH',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer '+SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if(!res.ok) { const e=await res.text(); throw new Error(e); }
  return true;
}

// Block timer
let blkIv=null;
function startBlockTimer(){
  if(blkIv)clearInterval(blkIv);
  if(!S.blocked)return;
  blkIv=setInterval(()=>{
    const l=Math.max(0,S.blocked-Date.now());
    S.timeLeft=Math.ceil(l/1000);
    if(l<=0){S.blocked=0;S.blockReason='';ss('blockedUntil',0);clearInterval(blkIv);}
    renderBanner();
  },1000);
  S.timeLeft=Math.ceil((S.blocked-Date.now())/1000);
}
function doBlock(r){const u=Date.now()+BLOCK_MS;S.blocked=u;S.blockReason=r;ss('blockedUntil',u);startBlockTimer();}
function incCount(){S.daily++;ss('qdata',{date:today(),count:S.daily});}

// Search
async function doSearch(){
  const unlimited=S.user?.role==='inspector'||S.user?.role==='admin';
  if(!unlimited){
    if(S.blocked>Date.now())return;
    if(S.daily>=MAX_DAILY){doBlock('Límite de 30 consultas diarias alcanzado.');renderBanner();return;}
  }
  const q=S.query.trim().toLowerCase().replace(/\./g,'');
  if(!q)return;
  S.loading=true; renderMainZone();
  try{
    let found;
    if(S.stype==='dni'){
      found = await sbSelect('pases',{eq:{dni:q}, order:'updated_at.desc', limit:50});
    } else {
      found = await sbSelect('pases',{ilike:{nombre:'*'+q+'*'}, order:'updated_at.desc', limit:50});
    }
    if(!unlimited)incCount();
    S.results=found||[]; S.searched=true;
    S.obs=''; S.photo=null; S.photoName=''; S.submitted=false;
  }catch(e){
    S.results=[]; S.searched=true;
    console.error('Search error:',e);
  }
  S.loading=false; renderMainZone();
}

// Supabase auth/actions
async function loginInspector(id,pw){
  if(id===ADMIN_ID&&pw===ADMIN_PW){
    S.user={id:ADMIN_ID,nombre:'Administrador',role:'admin',linea:'Administración'};
    S.view='admin';
    await loadAdmin(); render(); return null;
  }
  try{
    const data=await sbSelect('inspectores',{eq:{id:id}});
    if(!data||data.length===0)return 'ID no encontrado. Si no tenés acceso, solicitalo.';
    const u=data[0];
    if(u.password!==pw)return 'Contraseña incorrecta.';
    if(u.status==='pending'){S.user=u;S.view='pending';render();return null;}
    if(u.status==='rejected'){S.user=u;S.view='rejected';render();return null;}
    if(u.status==='approved'){S.user=u;S.view='app';render();return null;}
    return 'Estado desconocido.';
  }catch(e){return 'Error de conexión: '+e.message;}
}

async function submitRequest(form){
  try{
    const existing=await sbSelect('inspectores',{eq:{id:form.id}});
    if(existing&&existing.length>0){
      const u=existing[0];
      if(u.status==='approved'){S.user=u;S.view='app';render();return null;}
      if(u.status==='pending'){S.user=u;S.view='pending';render();return null;}
      if(u.status==='rejected'){S.user=u;S.view='rejected';render();return null;}
    }
    await sbInsert('inspectores',{
      id:form.id, nombre:form.name, password:form.pw,
      linea:form.linea, role:'inspector', status:'pending',
      requested_at:new Date().toISOString()
    });
    S.user={id:form.id,nombre:form.name,linea:form.linea,status:'pending',role:'inspector'};
    S.view='pending'; render(); return null;
  }catch(e){return 'Error: '+e.message;}
}

async function checkStatus(){
  try{
    const data=await sbSelect('inspectores',{eq:{id:S.user?.id}});
    if(!data||data.length===0)return;
    const u=data[0];
    S.user=u;
    if(u.status==='approved'){S.view='app';render();}
    else if(u.status==='rejected'){S.view='rejected';render();}
    else{alert('Aún pendiente. El administrador revisará tu solicitud pronto.');}
  }catch(e){alert('Error de conexión.');}
}

async function loadAdmin(){
  try{
    const all=await sbSelect('inspectores',{order:'requested_at.desc',limit:200});
    S.requests=(all||[]).filter(r=>r.role==='inspector');
    S.inspectors=(all||[]).filter(r=>r.status==='approved');
    S.dbCount=await sbCount('pases');
  }catch(e){console.error(e);}
}

async function loadLogs(){
  try{
    S.logs=await sbSelect('consultas',{order:'timestamp.desc',limit:100})||[];
  }catch(e){console.error(e);}
}

async function approveReq(id){
  await sbUpdate('inspectores',{id},{status:'approved',approved_at:new Date().toISOString()});
  await loadAdmin(); renderAdminTab();
}

async function rejectReq(id,reason){
  await sbUpdate('inspectores',{id},{status:'rejected',reject_reason:reason||'No aprobado.',rejected_at:new Date().toISOString()});
  S.rejectId=null; S.rejectReason='';
  await loadAdmin(); renderAdminTab(); renderModal();
}

async function revokeIns(id){
  if(!confirm('¿Revocar acceso?'))return;
  await sbUpdate('inspectores',{id},{status:'rejected',reject_reason:'Acceso revocado por el administrador.',rejected_at:new Date().toISOString()});
  await loadAdmin(); renderAdminTab();
}

async function saveLog(obs,photo){
  try{
    await sbInsert('consultas',{
      inspector_id:S.user?.id,
      inspector_nombre:S.user?.nombre,
      linea:S.user?.linea,
      query:S.query, search_type:S.stype,
      resultados:S.results?.length||0,
      observacion:obs, tiene_foto:!!photo,
      timestamp:new Date().toISOString()
    });
  }catch(e){console.error('Log error:',e);}
}

    $('lbtnLogin').textContent='Verificando...';

function bindRegForm(){
  $('lback').onclick=()=>{$('lbody').innerHTML=renderLoginChoose();bindLogin();};
  $('rSubmit').onclick=async()=>{
    const id=$('rId').value.trim().toUpperCase().replace(/\s/g,'');
    const name=$('rName').value.trim();
    const linea=$('rLinea').value.trim();
    const pw=$('rPw').value;
    const pw2=$('rPw2').value;
    if(!id||!name||!linea||!pw){$('rerr').innerHTML='<p class="errmsg">Completá todos los campos.</p>';return;}
    if(pw!==pw2){$('rerr').innerHTML='<p class="errmsg">Las contraseñas no coinciden.</p>';return;}
    if(pw.length<6){$('rerr').innerHTML='<p class="errmsg">La contraseña debe tener mínimo 6 caracteres.</p>';return;}
    if(id===ADMIN_ID){$('rerr').innerHTML='<p class="errmsg">ID no disponible.</p>';return;}
    $('rSubmit').textContent='Enviando...';
    const err=await submitRequest({id,name,pw,linea});
    if(err){$('rerr').innerHTML=`<p class="errmsg">${err}</p>`;$('rSubmit').textContent='Enviar solicitud';}
  };
}

}

function renderMainHTML(){
  const isBlocked=S.blocked>Date.now();
  const unlimited=S.user?.role==='inspector'||S.user?.role==='admin';
  const left=Math.max(0,MAX_DAILY-S.daily);
  const exhausted=!unlimited&&left===0&&!isBlocked;
  const dis=isBlocked||exhausted;

  if(S.loading)return'<div class="loading"><div class="spinner"></div><p>Buscando...</p></div>';

  if(!S.searched)return`
    <div class="card">
      <h2 class="ctit">Verificación de Pase</h2>
      <p class="csub">Consultá la vigencia de un pase de discapacidad</p>
      <div class="togrow">
        <button class="tog ${S.stype==='dni'?'on':''}" id="togDni">Por DNI</button>
        <button class="tog ${S.stype==='name'?'on':''}" id="togName">Por Apellido/Nombre</button>
      </div>
      <div class="srow">
        <input class="sinp" id="sinp" ${dis?'disabled':''} placeholder="${S.stype==='dni'?'Ingresá el DNI (sin puntos)':'Ingresá apellido o nombre'}" value="${S.query}"/>
        <button class="sbtn" id="sbtn" ${dis?'disabled':''}>Buscar</button>
      </div>
      ${!unlimited?`<div class="ubar">
        <div class="utrack"><div class="ufill" style="width:${(S.daily/MAX_DAILY)*100}%;background-color:${S.daily>=MAX_DAILY?'#ef4444':S.daily>=22?'#f59e0b':'#22c55e'}"></div></div>
        <span class="utxt">${S.daily}/30 hoy</span>
      </div>`:''}
      ${S.user?.role==='inspector'?`<div style="margin-top:10px;background:#f0fdf4;border-radius:8px;padding:8px 12px">
        <p style="margin:0;font-size:12px;color:#15803d">👮 <strong>${S.user.nombre}</strong> · ${S.user.linea} · Acceso ilimitado</p>
      </div>`:''}
    </div>
    <div class="dbinfo">
      <span>📁 ${S.dbCount.toLocaleString()} registros en base</span>
      <span>🔄 Actualización cada 15 días</span>
    </div>`;

  // Group results by DNI — show all tramites per person
  const grouped = {};
  (S.results||[]).forEach(r=>{
    if(!grouped[r.dni])grouped[r.dni]={...r, tramites:[]};
    grouped[r.dni].tramites.push({vencimiento_cud:r.vencimiento_cud, tipo_tramite:r.tipo_tramite, institucion:r.institucion, updated_at:r.updated_at});
  });
  const persons=Object.values(grouped);

  return`
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <button class="bnav" id="backMenu">🏠 Volver al Menú</button>
      ${!unlimited?`<span style="font-size:12px;color:#6b7280">${S.daily}/30</span>`:''}
    </div>
    ${persons.length===0?`
      <div class="noresult">
        <div style="font-size:40px">🔍</div>
        <p style="font-size:15px;color:#374151;margin:10px 0 4px;font-weight:600">Sin resultados</p>
        <p style="font-size:13px;color:#6b7280;margin:0">No se encontraron registros.</p>
      </div>`:persons.map(p=>renderPersonCard(p)).join('')}
    ${persons.length>0&&S.user&&!S.submitted?renderObsForm():''}
    ${S.submitted?renderConfirmBox():''}
    <button class="bsec" id="newSearch">🔍 Nueva consulta</button>`;
}

function renderPersonCard(p){
  // Use most recent tramite for main status
  const latest = p.tramites.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at))[0];
  const vig=isVig(latest?.vencimiento_cud);
  const sinFecha=!latest?.vencimiento_cud;
  const label=sinFecha?'REGISTRADO — SIN FECHA':vig?'✓ PASE VIGENTE':'✗ PASE VENCIDO';
  const color=sinFecha?'#92400e':vig?'#15803d':'#dc2626';
  const bg=sinFecha?'#fef3c7':vig?'#dcfce7':'#fee2e2';
  const border=sinFecha?'#f59e0b':vig?'#22c55e':'#ef4444';
  return`
  <div class="rcard" style="border-left-color:${border}">
    <div class="rbadge" style="background:${bg};color:${color}">${label}</div>
    <div class="rgrid">
      <div class="rfield" style="grid-column:1/-1">
        <span class="rkey">Nombre Completo</span>
        <span class="rval" style="font-size:18px">${p.nombre}</span>
      </div>
      <div class="rfield"><span class="rkey">DNI</span><span class="rval">${p.dni}</span></div>
      <div class="rfield">
        <span class="rkey">Último vencimiento CUD</span>
        <span class="rval" style="color:${color};font-weight:800">${fmtDate(latest?.vencimiento_cud)}</span>
      </div>
    </div>
    ${p.tramites.length>1?`
      <div class="tram-block">
        <p style="margin:0 0 6px;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px">Historial de trámites (${p.tramites.length})</p>
        ${p.tramites.map(t=>`
          <div class="tram-row">
            <span class="tram-tipo">${t.tipo_tramite||'—'} ${t.institucion?'· '+t.institucion:''}</span>
            <span class="tram-venc" style="color:${isVig(t.vencimiento_cud)?'#15803d':t.vencimiento_cud?'#dc2626':'#9ca3af'}">${fmtDate(t.vencimiento_cud)}</span>
          </div>`).join('')}
      </div>`:
      `<div style="margin-top:8px;font-size:12px;color:#6b7280">
        ${p.tramites[0].tipo_tramite||''} ${p.tramites[0].institucion?'· '+p.tramites[0].institucion:''}
      </div>`}
  </div>`;
}

  $('app').addEventListener('click',async e=>{
    const id=e.target.id;
    if(id==='doLogout'){S.user=null;S.view='login';S.searched=false;S.results=null;S.query='';render();}
    else if(id==='goMenu'||id==='backMenu'||id==='newSearch'){S.searched=false;S.results=null;S.query='';S.obs='';S.photo=null;S.submitted=false;renderMainZone();}
    else if(id==='goAdmin'){S.view='admin';await loadAdmin();render();}

    else if(id==='togName'){S.stype='name';renderMainZone();}

    <p style="font-size:13px;color:#6b7280;margin:0 0 14px">${S.logs.length} consultas registradas</p>
    ${S.logs.length===0?'<p class="empty">Sin registros aún</p>':
    S.logs.map(l=>`<div style="padding:10px 0;border-bottom:1px solid #f3f4f6">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px">
        <p style="margin:0;font-weight:700;font-size:13px">${l.inspector_nombre} · ${l.linea}</p>
        <p style="margin:0;font-size:11px;color:#6b7280">${new Date(l.timestamp).toLocaleString('es-AR')}</p>
      </div>
      <p style="margin:3px 0 0;font-size:12px;color:#374151">(${l.search_type==='dni'?'DNI':'Nombre'}): <strong>${l.query}</strong> · ${l.resultados} resultado(s)</p>
      ${l.observacion?`<p style="margin:2px 0 0;font-size:12px;color:#6b7280;font-style:italic">"${l.observacion}"</p>`:''}
      ${l.tiene_foto?'<span style="font-size:11px;color:#003087">📎 Con archivo adjunto</span>':''}
    </div>`).join('')}
  </div>`;
}

function renderModalHTML(){
  if(!S.rejectId)return'';
  return`<div class="moverlay">
    <div class="modal">
      <h3 style="margin:0 0 12px;font-size:16px;font-weight:800">Rechazar solicitud</h3>
      <label class="flbl">Motivo (opcional)</label>
      <textarea id="rejReason" rows="3" placeholder="Ej: Datos incompletos...">${S.rejectReason}</textarea>
      <div style="display:flex;gap:8px">
        <button class="bpri" id="confRej" style="background:#dc2626">Rechazar</button>
        <button class="bsec" id="cancRej" style="margin-top:0">Cancelar</button>
      </div>
    </div>
  </div>`;
}

function renderAdminTab(){const t=$('adminTab');if(t)t.innerHTML=renderAdminTabHTML();renderModal();}
function renderModal(){const m=$('modalZone');if(m){m.innerHTML=renderModalHTML();bindModal();}}
function bindModal(){
  const cr=$('confRej');if(cr)cr.onclick=()=>{S.rejectReason=$('rejReason')?.value||'';rejectReq(S.rejectId,S.rejectReason);};
  const ca=$('cancRej');if(ca)ca.onclick=()=>{S.rejectId=null;S.rejectReason='';renderModal();};
}

function bindAdmin(){
  $('app').addEventListener('click',async e=>{
    const id=e.target.id;const t=e.target;
    if(id==='aGoApp'){S.view='app';render();}
    else if(id==='aLogout'){S.user=null;S.view='login';render();}
    else if(id==='tabReq'){S.adminTab='requests';renderAdminTab();}
    else if(id==='tabAct'){S.adminTab='active';renderAdminTab();}
    else if(id==='tabLog'){S.adminTab='logs';await loadLogs();renderAdminTab();}
    else if(t.dataset.approve){await approveReq(t.dataset.approve);}
    else if(t.dataset.reject){S.rejectId=t.dataset.reject;renderModal();}
    else if(t.dataset.revoke){await revokeIns(t.dataset.revoke);}
  });
  bindModal();
}

// INIT
startBlockTimer();
render();
</script>
</body>
</html>
